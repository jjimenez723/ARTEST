<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AR T-Shirt</title>

    <!-- 1. Library Setup: Import A-Frame and MindAR Extension -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <!-- 5. Mobile Autoplay Handling (Styling) -->
    <style>
        #ui-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            /* Ensure it stays above everything */
        }

        #start-btn {
            padding: 15px 30px;
            font-size: 22px;
            font-family: sans-serif;
            font-weight: bold;
            background-color: #ffffff;
            color: #000000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>

<body>
    <!-- 5. Mobile Autoplay Handling (HTML UI) -->
    <div id="ui-overlay">
        <button id="start-btn">Tap to Start AR</button>
    </div>

    <!-- 2. Scene Configuration -->
    <!-- Note: autoStart is set to false so it waits for the user tap -->
    <a-scene mindar-image="imageTargetSrc: ./target.mind; autoStart: false;" color-space="sRGB"
        renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false">

        <!-- 3. Asset Management (Preloading Video) -->
        <!-- playsinline and webkit-playsinline are crucial for mobile iOS -->
        <a-assets>
            <video id="vid" src="./vid.mp4" preload="auto" loop crossorigin="anonymous" playsinline
                webkit-playsinline></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <!-- 4. The AR Target -->
        <!-- Width is typically normalized to 1 in MindAR. 16:9 ratio means height = 9/16 = 0.5625 -->
        <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
            <a-video src="#vid" position="0 0 0" width="1" height="0.5625" rotation="0 0 0">
            </a-video>
        </a-entity>
    </a-scene>

    <!-- 6. Tracking Event Listeners -->
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const sceneEl = document.querySelector('a-scene');
            const overlay = document.getElementById('ui-overlay');
            const startBtn = document.getElementById('start-btn');
            const video = document.getElementById('vid');
            const arTarget = document.getElementById('ar-target');

            // Mobile Autoplay Handling: User must interact with document first
            startBtn.addEventListener('click', function () {
                // Play and immediately pause to unlock the video context in mobile browsers
                video.play();
                video.pause();

                // Hide our custom overlay
                overlay.style.display = 'none';

                // Start the MindAR camera and tracking system
                sceneEl.systems["mindar-image-system"].start();
            });

            // Event listener: When the image target is found
            arTarget.addEventListener("targetFound", event => {
                console.log("MindAR Target Found!");
                // Play the video
                video.play();
            });

            // Event listener: When the image target is lost
            arTarget.addEventListener("targetLost", event => {
                console.log("MindAR Target Lost!");
                // Pause the video
                video.pause();
            });
        });
    </script>
</body>

</html>
