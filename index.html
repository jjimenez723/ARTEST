<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Luxury Property AR Experience</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="shortcut icon" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">

    <!-- 1. Library Setup: Import A-Frame and MindAR Extension -->
    <!-- <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script> -->
    <!-- <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script> -->

    <!-- 5. Mobile Autoplay Handling (Styling) -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap');

        #ui-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(8, 10, 14, 0.95), rgba(15, 23, 42, 0.98));
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            font-family: 'Inter', sans-serif;
        }

        .content-box {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 48px 40px;
            max-width: 85%;
            width: 380px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            color: #ffffff;
        }

        .content-box h1 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            margin-top: 0;
            margin-bottom: 24px;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: #f8fafc;
            line-height: 1.2;
        }

        .content-box p {
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 32px;
            color: #94a3b8;
            font-weight: 300;
        }

        .instructions {
            text-align: left;
            background: rgba(0, 0, 0, 0.2);
            padding: 24px;
            border-radius: 16px;
            margin-bottom: 36px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .instructions ol {
            margin: 0;
            padding-left: 20px;
            color: #e2e8f0;
            font-size: 14px;
            line-height: 1.7;
        }

        .instructions li {
            margin-bottom: 12px;
            padding-left: 4px;
        }

        .instructions li:last-child {
            margin-bottom: 0;
        }

        .instructions li::marker {
            color: #d4af37;
            font-weight: 500;
        }

        #start-btn {
            display: block;
            width: 100%;
            padding: 16px 32px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 500;
            background: linear-gradient(to right, #d4af37, #f3e5ab, #d4af37);
            background-size: 200% auto;
            color: #1a1a1a;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 10px 20px -5px rgba(212, 175, 55, 0.4);
            transition: all 0.3s ease;
        }

        #start-btn:hover {
            background-position: right center;
            box-shadow: 0 15px 25px -5px rgba(212, 175, 55, 0.5);
            transform: translateY(-2px);
        }

        #start-btn:active {
            transform: translateY(1px);
        }

        #agent-link {
            position: fixed;
            top: 48px;
            left: 50%;
            transform: translateX(-50%);
            top: max(48px, env(safe-area-inset-top));
            z-index: 10000;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 30px;
            padding: 12px 32px;
            color: #f8fafc;
            text-decoration: none;
            text-align: center;
            width: max-content;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.5px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
            transition: all 0.3s ease;
        }

        #agent-link:hover {
            background: rgba(212, 175, 55, 0.2);
            border-color: rgba(212, 175, 55, 0.8);
            color: #ffffff;
            transform: translate(-50%, -2px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.5);
        }

        #agent-link:active {
            transform: translate(-50%, 1px);
        }

        #contact-btn {
            position: fixed;
            bottom: 48px;
            left: 50%;
            transform: translateX(-50%);
            bottom: max(48px, env(safe-area-inset-bottom));
            z-index: 10000;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 30px;
            padding: 12px 32px;
            color: #f8fafc;
            text-decoration: none;
            text-align: center;
            width: max-content;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.5px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        #contact-btn:hover {
            background: rgba(212, 175, 55, 0.2);
            border-color: rgba(212, 175, 55, 0.8);
            color: #ffffff;
            transform: translate(-50%, -2px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.5);
        }

        #contact-btn:active {
            transform: translate(-50%, 1px);
        }

        /* Landscape Optimization for Mobile Devices */
        @media (orientation: landscape) and (max-height: 600px) {
            #ui-overlay {
                align-items: center;
                padding: 16px;
                overflow-y: auto;
            }

            .content-box {
                padding: 24px;
                width: 100%;
                max-width: 680px;
                display: grid;
                grid-template-columns: 1fr 1.2fr;
                gap: 24px;
                align-items: center;
                text-align: left;
                margin: auto;
            }

            .content-box h1 {
                font-size: 20px;
                margin-bottom: 8px;
            }

            .content-box p {
                font-size: 13px;
                margin-bottom: 16px;
            }

            .instructions {
                margin-bottom: 0;
                padding: 16px;
                height: 100%;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }

            .instructions ol {
                font-size: 12px;
                line-height: 1.5;
            }

            .instructions li {
                margin-bottom: 8px;
            }

            #start-btn {
                padding: 12px 20px;
                font-size: 13px;
                width: 100%;
            }

            .content-box>h1 {
                grid-column: 1;
                grid-row: 1;
            }

            .content-box>p {
                grid-column: 1;
                grid-row: 2;
            }

            .content-box>button {
                grid-column: 1;
                grid-row: 3;
                align-self: end;
            }

            .content-box>.instructions {
                grid-column: 2;
                grid-row: 1 / 4;
            }

            #agent-link {
                top: 24px;
                left: 50%;
                transform: translateX(-50%);
                padding: 8px 24px;
                font-size: 12px;
            }

            #contact-btn {
                bottom: 24px;
                left: 50%;
                transform: translateX(-50%);
                padding: 8px 24px;
                font-size: 12px;
            }
        }

        #main-video {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: contain;
            background-color: #000;
            z-index: 5000;
        }
    </style>
</head>

<body>
    <!-- Persistent Link to Agent Website -->
    <a href="https://dennis-davila.com/" id="agent-link" target="_blank" rel="noopener noreferrer">Click Here to Visit<br>
        Dennis Davila's Website</a>

    <button id="contact-btn">Save Contact Info</button>

    <!-- 5. Mobile Autoplay Handling (HTML UI) -->
    <div id="ui-overlay">
        <div class="content-box">
            <h1>Immersive Property Tour</h1>
            <p>Experience this luxury home.</p>

            <div class="instructions">
                <ol>
                    <li>Tap the <strong>View Experience</strong> button below to begin the tour.</li>
                </ol>
            </div>

            <button id="start-btn">View Experience</button>
        </div>
    </div>

    <!-- AR Integration Commented Out
    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; filterMinCF: 0.0001; filterBeta: 10000;"
        color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false">

        <a-assets>
            <video id="vid" src="./vid.mp4" preload="auto" loop crossorigin="anonymous" playsinline
                webkit-playsinline></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
            <a-video id="ar-video" src="#vid" position="0 0 0" width="1" height="1" rotation="0 0 0">
            </a-video>
        </a-entity>
    </a-scene>
    -->

    <!-- Simple Video Player Replacement -->
    <video id="main-video" src="./vid.mp4" controls playsinline webkit-playsinline></video>

    <!-- 6. Video Player Event Listeners -->
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const overlay = document.getElementById('ui-overlay');
            const startBtn = document.getElementById('start-btn');
            const mainVideo = document.getElementById('main-video');

            /* AR Code Commented Out
            const sceneEl = document.querySelector('a-scene');
            const video = document.getElementById('vid');
            const arTarget = document.getElementById('ar-target');
            const arVideo = document.getElementById('ar-video');

            // ... original AR tracking logic ...
            */

            // Simple Video Playback Handling
            startBtn.addEventListener('click', function () {
                // Hide our custom overlay
                overlay.style.display = 'none';

                // Show the main video
                mainVideo.style.display = 'block';

                // Play the video
                mainVideo.play().catch(e => console.error("Video play error:", e));
            });

            // Optional: Re-show overlay when video ends
            mainVideo.addEventListener('ended', function() {
                mainVideo.style.display = 'none';
                overlay.style.display = 'flex';
            });

            // Contact Info Download (vCard format)
            const contactBtn = document.getElementById('contact-btn');
            contactBtn.addEventListener('click', function () {
                const vcard = `BEGIN:VCARD\nVERSION:3.0\nN:Davila;Dennis;;;\nFN:Dennis Davila\nTEL;TYPE=CELL:2017800498\nEMAIL:luis.davila@cbrealty.com\nEND:VCARD`;
                const blob = new Blob([vcard], { type: 'text/vcard;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = 'Dennis_Davila.vcf';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            });
        });
    </script>
</body>

</html>
